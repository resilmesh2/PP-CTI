services:
  arxlet:
    image: arxlet:1.0
    container_name: resilmesh-tap-ppcti-arxlet
    hostname: resilmesh-tap-ppcti-arxlet
    expose:
      - 8080
      - 8000
    environment:
      - "JAVA_TOOL_OPTIONS=\"-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:8000\""
    networks:
      - resilmesh_network
