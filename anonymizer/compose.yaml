services:
  anonymizer:
    build:
      context: .
      args:
        project_name: anonymizer
    container_name: PP-CTI-Anonymizer
    expose:
      - 8070
    ports:
      - 8070:8070
    volumes:
      - ./pipelines:/pipelines
      - ./config.yaml:/usr/config.yaml
      - ./resources/pgp:/pgp_keys
    depends_on:
      - arxlet
      - flaskdp
      - context
    environment:
      PYTHONPATH: ./src
    command: --extra-pipelines /pipelines --extra-pgp-keys /pgp_keys
    networks:
      - resilmesh_network

  context:
    image: mysql:8
    container_name: PP-CTI-Anonymizer-Context
    expose:
      - 3306
    environment:
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - v_context:/var/lib/mysql
    networks:
      - resilmesh_network

volumes:
  v_context:
